name: Daily Scrape

on:
  schedule:
    # 06:00 UTC = 08:00 svensk tid (CEST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Manuell trigger via GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npx tsx src/lib/scraper.ts

      - name: Commit & push updated deals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/cache/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily deal update $(date -u +%Y-%m-%d)"
            git push
          fi
