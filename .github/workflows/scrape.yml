name: Daily Scrape

on:
  schedule:
    # 06:00 UTC = 08:00 svensk tid (CEST)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Awin feed (update-cache)
        run: npm run update-cache

      - name: Trigger Vercel production deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::error::Saknar GitHub secret DEPLOY_HOOK_URL."
            echo "Skapa en Deploy Hook i Vercel (Project → Settings → Git → Deploy Hooks)"
            echo "och lägg URL:en som repository secret: DEPLOY_HOOK_URL"
            exit 1
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL"
          echo "Vercel deploy hook triggered — build kör update-cache och publicerar ny cache."
